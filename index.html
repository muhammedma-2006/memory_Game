<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="main">
        <div class="header">
            <div class="text-8xl mb-6 animate-pulse">🧠</div>
            <h1>Memory Match</h1>
            <p>Choose Your Challenge</p>
        </div>
        
        <div class="cards">
            <button class="card" onclick="easy()">
                <span class="text-3xl group-hover:animate-bounce">😊</span>
                <div >
                    <h2>Easy (4x4)</h2>
                    <p class="para">16 cards</p>
                </div>
                <span class="text-2xl group-hover:translate-x-1 transition-transform">→</span>
            </button>
            <button class="card">
               <span class="text-3xl group-hover:animate-bounce">🤔</span>
                <div>
                    <h2>Medium (6x6)</h2>
                    <p class="para">36 cards</p>
                </div>
                <span class="text-2xl group-hover:translate-x-1 transition-transform">→</span>
            </button>
            <button class="card">
                <span class="text-3xl group-hover:animate-bounce">🤯</span>
                <div>
                    <h2>Hard (8x8)</h2>
                    <p class="para">64 cards</p>
                </div>
               <span class="text-2xl group-hover:translate-x-1 transition-transform">→</span>
            </button>
        </div>
        <p>🎯 Match all pairs to win </p>
        <p>⏱️ Try to beat your best time</p> 
        <p>🔄 Keep your moves to a minimum</p> 
    </div>


</body>
</html>
