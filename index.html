<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style></style>
</head>
<body>
    <div>
        <div class="text-8xl mb-6 animate-pulse">🧠</div>
        <h1>Memory Match</h1>
        <h6>Choose Your Challenge</h6>
        <div>
            <div>
                <span class="text-3xl group-hover:animate-bounce">😊</span>
                <h2>Easy(4x4)</h2>
                <p>16 cards</p>
                <span class="text-2xl group-hover:translate-x-1 transition-transform">→</span>
            </div>
             <div>
               <span class="text-3xl group-hover:animate-bounce">🤔</span>
                <h2>Medium(6x6)</h2>
                <p>36 cards</p>
                <span class="text-2xl group-hover:translate-x-1 transition-transform">→</span>
            </div>
             <div>
                <span class="text-3xl group-hover:animate-bounce">🤯</span>
                <h2>Hard(8x8)</h2>
                <p>64 cards</p>
               <span class="text-2xl group-hover:translate-x-1 transition-transform">→</span>
            </div>
        </div>
        <p>🎯 Match all pairs to win </p>
        <p>⏱️ Try to beat your best time</p> 
        <p>🔄 Keep your moves to a minimum</p> 
    </div>


</body>
